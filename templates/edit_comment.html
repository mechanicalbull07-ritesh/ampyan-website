{% extends "base.html" %}
{% block content %}

<div style="max-width:600px; margin:auto;">

    <h2>Edit Reply</h2>

    <form method="POST">

        <textarea name="content"
                  required
                  style="width:100%; height:120px; background:#111; border:1px solid #333; color:white; padding:15px; border-radius:8px; resize:none;">
{{ comment.content }}</textarea>

        <button type="submit"
                style="margin-top:15px; background:#ff3b3b; border:none; padding:10px 20px; color:white; border-radius:6px; cursor:pointer;">
            Update Reply
        </button>

    </form>

</div>

{% endblock %}
