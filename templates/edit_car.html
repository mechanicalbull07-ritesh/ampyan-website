{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">

<div class="auth-container">

<h2 class="auth-title">Edit Your Car</h2>

<form method="POST" class="auth-form">

<label class="form-label">Car Brand</label> <input type="text" name="brand" value="{{ car.brand }}" class="auth-input"/>

<label class="form-label">Car Model</label> <input type="text" name="model" value="{{ car.model }}" class="auth-input"/>

<label class="form-label">Manufacturing Year</label> <input type="number" name="year" value="{{ car.year }}" class="auth-input"/>

<label class="form-label">Fuel Type</label> <select name="fuel" class="auth-input">

<option value="Petrol" {% if car.fuel_type == "Petrol" %}selected{% endif %}>Petrol</option>

<option value="Diesel" {% if car.fuel_type == "Diesel" %}selected{% endif %}>Diesel</option>

<option value="CNG" {% if car.fuel_type == "CNG" %}selected{% endif %}>CNG</option>

<option value="Electric" {% if car.fuel_type == "Electric" %}selected{% endif %}>Electric</option>

</select>

<label class="form-label">Mileage (KM/L)</label> <input type="number" name="mileage" value="{{ car.mileage }}" class="auth-input"/>

<label class="form-label">Current Odometer (KM)</label> <input type="number" name="current_km" value="{{ car.current_km }}" class="auth-input"/>

<label class="form-label">Average Daily Driving (KM)</label> <input type="number" name="daily_km" value="{{ car.daily_km }}" class="auth-input"/>

<label class="form-label">Last Service KM</label> <input type="number" name="last_service_km" value="{{ car.last_service_km }}" class="auth-input"/>

<label class="form-label">Insurance Expiry</label>
<input type="date" name="insurance_expiry" value="{{ car.insurance_expiry }}" class="auth-input"/>

<label class="form-label">Pollution Expiry</label>
<input type="date" name="pollution_expiry" value="{{ car.pollution_expiry }}" class="auth-input"/>

<!-- BRAKE -->

<label class="form-label">Brake Replaced KM</label>

<input
type="number"
id="brake_km"
name="brake_replaced_km"
placeholder="Example: 40000"
value="{{ car.brake_replaced_km or '' }}"
class="auth-input"
/>

<div class="preset-buttons">

<button type="button" onclick="setValue('brake_km',30000)">30k</button>

<button type="button" onclick="setValue('brake_km',40000)">40k</button>

<button type="button" onclick="setValue('brake_km',50000)">50k</button>

</div>

<!-- TYRE -->

<label class="form-label">Tyre Replaced KM</label>

<input
type="number"
id="tyre_km"
name="tyre_replaced_km"
placeholder="Example: 50000"
value="{{ car.tyre_replaced_km or '' }}"
class="auth-input"
/>

<div class="preset-buttons">

<button type="button" onclick="setValue('tyre_km',40000)">40k</button>

<button type="button" onclick="setValue('tyre_km',50000)">50k</button>

<button type="button" onclick="setValue('tyre_km',60000)">60k</button>

</div>

<!-- CLUTCH -->

<label class="form-label">Clutch Replaced KM</label>

<input
type="number"
id="clutch_km"
name="clutch_replaced_km"
placeholder="Example: 70000"
value="{{ car.clutch_replaced_km or '' }}"
class="auth-input"
/>

<div class="preset-buttons">

<button type="button" onclick="setValue('clutch_km',60000)">60k</button>

<button type="button" onclick="setValue('clutch_km',80000)">80k</button>

<button type="button" onclick="setValue('clutch_km',100000)">100k</button>

</div>

<!-- BATTERY -->

<label class="form-label">Battery Replaced Year</label>

<input
type="number"
id="battery_year"
name="battery_replaced_year"
placeholder="Example: 2023"
value="{{ car.battery_replaced_year or '' }}"
class="auth-input"
/>

<div class="preset-buttons">

<button type="button" onclick="setValue('battery_year',2022)">2022</button>

<button type="button" onclick="setValue('battery_year',2023)">2023</button>

<button type="button" onclick="setValue('battery_year',2024)">2024</button>

</div>

<button type="submit" class="auth-button">

Update Car

</button>

</form>

</div>

</div>

<script>

function setValue(field,value){

document.getElementById(field).value = value;

}

</script>

{% endblock %}
