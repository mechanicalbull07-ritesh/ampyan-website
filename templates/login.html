{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to access your AMPYAN garage, diagnostics and community profile.</p>
        </div>

        <div class="google-login">
            <a href="/login/google" class="google-btn">
                <i class="fa-brands fa-google"></i>
                Continue with Google
            </a>
        </div>

        <div class="divider">
            <span>or continue with username</span>
        </div>

        <form method="POST" autocomplete="off">
            <div class="input-group">
                <input name="username" placeholder="Username or email" required>
            </div>
            <div class="input-group">
                <input name="password" type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="auth-btn">Login</button>
        </form>

        <div class="auth-footer">
            <p>New here? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
        </div>

    </div>

</div>

{% endblock %}
